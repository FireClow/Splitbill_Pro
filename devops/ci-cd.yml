name: SplitBill Pro CI/CD
on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r backend/requirements.txt pytest httpx
      - name: Run tests
        env:
          MONGO_URL: mongodb://localhost:27017
          DB_NAME: test_database
        run: cd backend && python -m pytest tests/ -v

  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f devops/Dockerfile -t splitbill-pro:${{ github.sha }} .
      - name: Push to registry
        run: |
          echo "Push to your container registry here"
          # docker tag splitbill-pro:${{ github.sha }} registry.example.com/splitbill-pro:latest
          # docker push registry.example.com/splitbill-pro:latest

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to production
        run: |
          echo "Deploy to your infrastructure here"
